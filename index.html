<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- FIXED CSP: -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://www.paypal.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' https://www.paypalobjects.com data:;
    frame-src https://www.paypal.com;
    form-action https://www.paypal.com;
    object-src 'none';
    base-uri 'none';
    connect-src 'self' https://student-live.oppcus2025.workers.dev;
  " />
  <title>OPPCUS Home Page</title>
  <link rel="icon" type="image/png" href="images/oppcus.png" />
  <style>
    body {
      background: #000;
      color: #0F0;
      font-family: monospace;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .locked {
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
    }
    .badge {
      color: #66ff66;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .cert {
      display: block;
      margin: 10px auto;
      padding: 10px;
      border: 2px solid #0F0;
      border-radius: 8px;
      width: fit-content;
      cursor: pointer;
    }
    .cert:not(.locked):hover {
      box-shadow: 0 0 12px #0F0;
    }
    #paypalContainer {
      margin: 10px auto;
    }
  </style>
</head>
<body>
  <h1>OPPCUS</h1>

  <div class="badge" id="status">
    Checking access...
  </div>

  <!-- PayPal Button -->
  <div id="paypalContainer">
    <form action="https://www.paypal.com/ncp/payment/5B76FJE8MKP2L" method="post" target="_blank">
      <input type="submit" value="Buy Now" style="background:#FFD140;color:#000;padding:8px 20px;font-weight:bold;border-radius:5px;cursor:pointer;border:none;" />
    </form>
  </div>

  <!-- CERTS -->
  <div id="content">
    <div class="cert locked" id="secplus">Security+</div>
    <div class="cert locked" id="netplus">Network+</div>
    <div class="cert locked" id="linuxplus">Linux+</div>
    <div class="cert locked" id="ctf">CTF</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
