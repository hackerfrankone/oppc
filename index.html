<!DOCTYPE html>
<html lang="en">
<head>  
  <meta charset="UTF-8" />

  <!-- CSP (SAFE + STABLE) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.paypal.com https://static.cloudflareinsights.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' https://www.paypalobjects.com data:;
    frame-src https://www.paypal.com;
    object-src 'none';
    base-uri 'none';
    connect-src 'self' https://student-live.oppcus2025.workers.dev;
  " />

  <title>OPPCUS Home Page</title>
  <link rel="icon" type="image/png" href="images/oppcus.png" />

  <style>
    body {
      background:#000;
      color:#0F0;
      font-family:monospace;
      text-align:center;
      margin:0;
      padding:20px;
    }

    .locked {
      opacity: 0.4;
      pointer-events: none;
    }

    .badge {
      color:#66ff66;
      font-size:14px;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

  <h1>OPPCUS</h1>

  <div class="badge" id="status">
    Checking access...
  </div>

  <!-- ALWAYS VISIBLE PAYPAL -->
  <div id="paypalContainer">
    <form action="https://www.paypal.com/ncp/payment/5B76FJE8MKP2L" method="post" target="_blank">
      <input type="submit" value="Buy Now" />
    </form>
  </div>

  <!-- CERTS (ALWAYS EXIST, ONLY LOCKED/UNLOCKED CHANGES) -->
  <div id="content">

    <div class="cert locked" id="secplus">Security+</div>
    <div class="cert locked" id="netplus">Network+</div>
    <div class="cert locked" id="linuxplus">Linux+</div>
    <div class="cert locked" id="ctf">CTF</div>

  </div>

  <script src="app.js"></script>

</body>
</html>
